version: '3'

vars:
  BIN: bin/rag{{exeExt}}

tasks:
  build:
    cmds:
      - go build -o {{.BIN}} ./cmd/rag

  index:
    deps: [build]
    cmds:
      - '{{.BIN}} index'

  search:
    deps: [build]
    cmds:
      - '{{.BIN}} search "{{.CLI_ARGS}}"'

  compare:
    deps: [build]
    cmds:
      - '{{.BIN}} compare'

  ask:
    deps: [build]
    cmds:
      - '{{.BIN}} ask "{{.CLI_ARGS}}"'

  eval:
    deps: [build]
    cmds:
      - '{{.BIN}} eval'

  eval-quick:
    deps: [build]
    cmds:
      - '{{.BIN}} eval-quick'

  ask-reranked:
    deps: [build]
    env:
      RERANKER_ENABLED: "true"
    cmds:
      - '{{.BIN}} ask "{{.CLI_ARGS}}"'

  eval-reranked:
    deps: [build]
    env:
      RERANKER_ENABLED: "true"
    cmds:
      - '{{.BIN}} eval'

  test:
    cmds:
      - go test ./...

  docker-up:
    cmds:
      - docker compose up -d

  docker-down:
    cmds:
      - docker compose down -v
